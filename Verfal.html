<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Verifikasi Dokumen Elektronik UII</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
text-align:center;
}

/* HEADER */

.header{
background:#1976d2;
color:white;
padding:12px;
font-size:18px;
}

.header span{
font-weight:bold;
}

/* CONTAINER */

.container{
background:white;
max-width:500px;
margin:60px auto;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* LOGO */

.logo{
width:110px;
margin-bottom:15px;
}

/* TITLE */

h1{
font-size:22px;
margin:5px;
}

h2{
font-size:18px;
font-weight:normal;
margin-bottom:25px;
}

/* INPUT */

input{
width:90%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

/* BUTTON */

button{
background:#1976d2;
color:white;
border:none;
padding:12px 30px;
font-size:16px;
border-radius:5px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#0d5cb6;
}

/* RESULT */

#result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

/* LOADING SCREEN */

#loading{
position:fixed;
width:100%;
height:100%;
background:white;
top:0;
left:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.spinner{
border:6px solid #eee;
border-top:6px solid #1976d2;
border-radius:50%;
width:50px;
height:50px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<!-- LOADING SCREEN -->

<div id="loading">
<div class="spinner"></div>
<p>Memuat Sistem Verifikasi...</p>
</div>

<!-- HEADER -->

<div class="header">
<span>verifikasi.uii.ac.id</span>
</div>

<!-- CONTENT -->

<div class="container">

<img src="logo-uii.png" class="logo">

<h1>VERIFIKASI DOKUMEN ELEKTRONIK</h1>
<h2>UNIVERSITAS ISLAM INDONESIA</h2>

<input type="text" id="nama" placeholder="Masukkan Nama">

<br>

<input type="text" id="nim" placeholder="Masukkan NIM">

<br>

<button onclick="verifikasi()">Cari / Tampilkan</button>

<div id="result"></div>

</div>

<script>

/* Loading screen */

window.onload = function(){
setTimeout(function(){
document.getElementById("loading").style.display="none";
},1500);
}

/* Verifikasi */

function verifikasi(){

let nama=document.getElementById("nama").value;
let nim=document.getElementById("nim").value;

if(nama=="" || nim==""){
document.getElementById("result").innerHTML="Data belum lengkap";
return;
}

/* simulasi database */

if(nim=="20240001"){
document.getElementById("result").innerHTML=
"Dokumen ditemukan atas nama <br><b>"+nama+"</b>";
}
else{
document.getElementById("result").innerHTML=
"Data tidak ditemukan";
}

}

</script>

</body>
  </html>
